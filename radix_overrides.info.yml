name: Radix overrides
description: 'Fill the gap between Radix and Drupal default behaviours and our shared components.'
screenshot: screenshot.png
'alt text': 'radix_overrides theme screenshot'
core_version_requirement: ^10.3 || ^11
engine: twig
type: theme
'base theme': radix
starterkit: true
dependencies:
  - 'drupal:serialization'
  - 'drupal:radix'
regions:
  navbar_branding: 'Navbar branding'
  navbar_left: 'Navbar left'
  navbar_right: 'Navbar right'
  sidebar: 'Sidebar'
  sidebar_footer: 'Sidebar footer'
  content: 'Content'
  footer: 'Footer'

libraries:
  - radix_overrides/entity_browser_fix

libraries-override:
  text/drupal.text: radix_overrides/drupal.text
  core/drupal.vertical-tabs: radix_overrides/drupal.vertical-tabs
  core/drupal.autocomplete:
    css:
      component:
        misc/components/autocomplete-loading.module.css: false
  core/drupal.dialog:
    css:
      component:
        assets/vendor/jquery.ui/themes/base/dialog.css: false
  core/drupal.dialog.off_canvas:
    css:
      base:
        misc/dialog/off-canvas/css/reset.css: false
        misc/dialog/off-canvas/css/base.css: false
        misc/dialog/off-canvas/css/utility.css: false
      component:
        misc/dialog/off-canvas/css/button.css: false
        misc/dialog/off-canvas/css/drupal.css: false
        misc/dialog/off-canvas/css/form.css: false
        misc/dialog/off-canvas/css/table.css: false
        misc/dialog/off-canvas/css/details.css: false
        misc/dialog/off-canvas/css/messages.css: false
        misc/dialog/off-canvas/css/tabledrag.css: false
        misc/dialog/off-canvas/css/throbber.css: false
        misc/dialog/off-canvas/css/dropbutton.css: false
        misc/dialog/off-canvas/css/titlebar.css: false
        misc/dialog/off-canvas/css/wrapper.css: false
  core/drupal.dropbutton: false
  core/drupal.tableheader: false
  field_ui/drupal.field_ui:
    css:
      theme:
        css/field_ui.admin.css: false
  layout_builder/drupal.layout_builder:
    css:
      theme:
        css/layout-builder.css: false
        css/off-canvas.css: false
  node/drupal.node.preview:
    css:
      theme:
        css/node.preview.css: false
  system/base:
    css:
      component:
        css/components/clearfix.module.css: false
        css/components/container-inline.module.css: false
        css/components/tablesort.module.css: assets/css/component/tablesort.module.css
        css/components/system-status-counter.css: false
        css/components/system-status-report-counters.css: false
        css/components/system-status-report-general-info.css: false
        css/components/dialog.css: false
        css/components/resize.module.css: false
  core/drupal.tablesort:
    css:
      component:
        misc/components/tablesort.module.css: assets/css/component/tablesort.module.css
  clientside_validation_jquery/cv.jquery.ife: false
  views_data_export/views_data_export:
    css:
      theme:
        css/views_data_export.css: false
  entity_browser/tabs:
    css:
      component:
        css/entity_browser.tabs.css: false
    js:
      js/entity_browser.tabs.js: assets/js/entity_browser.tabs.js
  media_library_edit/admin:
    css:
      component:
        css/media_library_edit.admin.css: false
  dropzonejs/dropzonejs:
    css:
      component:
        /libraries/dropzone/dropzone.css: false
  dropzonejs/widget:
    css:
      theme:
        css/dropzone.widget.css: assets/css/component/dropzone.widget.css
  paragraphs/drupal.paragraphs.unpublished: false
  section_library/section_library:
    css:
      theme:
        css/section-library.css: false
  ui_icons/ui_icons.autocomplete:
    css:
      component:
        css/icon.autocomplete.css: false
  tagify/default:
    css:
      component:
        css/tagify.css: assets/css/component/tagify.css
  tagify/tagify: radix_overrides/tagify.tagify
  tagify/tagify_polyfils: radix_overrides/tagify.tagify_polyfils

libraries-extend:
  core/drupal.ajax:
    - radix_overrides/drupal.ajax
    - radix_overrides/drupal.throbber
  core/drupal.checkbox:
    - radix_overrides/drupal.checkbox
  core/drupal.dialog:
    - radix_overrides/drupal.dialog
  core/drupal.dialog.ajax:
    - radix_overrides/drupal.dialog.ajax
  core/drupal.dialog.off_canvas:
    - radix_overrides/drupal.dialog.off_canvas
  core/drupal.message:
    - radix_overrides/drupal.message
  node/drupal.node.preview:
    - radix_overrides/drupal.node.preview
  core/drupal.progress:
    - radix_overrides/drupal.progress
  core/drupal.tabledrag:
    - radix_overrides/drupal.tabledrag
  core/drupal.tableselect:
    - radix_overrides/drupal.tableselect
  core/ckeditor5:
    - radix_overrides/ckeditor5
  filepond/filepond:
    - radix_overrides/filepond
  filter/drupal.filter:
    - radix_overrides/filter
  media_entity_browser/view:
    - radix_overrides/media_entity_browser.view
  media_library/view:
    - radix_overrides/media_library.grid
  media_library/widget:
    - radix_overrides/media_library.grid
  entity_browser/modal:
    - radix_overrides/entity_browser_fix
  tagify/default:
    - radix_overrides/tagify
  plyr/plyr:
    - radix_overrides/plyr
